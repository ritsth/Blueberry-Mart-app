name: Test & Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'BlueberryMart.Api/**'
      - 'Tests/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: project-76ca6efe-7878-4dc8-bff
  REGION:     us-central1
  SERVICE:    blueberrymart-api
  IMAGE:      us-central1-docker.pkg.dev/project-76ca6efe-7878-4dc8-bff/blueberrymart/api

jobs:
  # ── Job 1: Run the integration test suite ────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       blueberry_mart_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: ritsth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BlueberryMart.Api

      - name: Check formatting
        run: dotnet format BlueberryMart.Api --verify-no-changes

      - name: Run integration tests
        run: dotnet test Tests/BlueberryMart.Api.Tests --verbosity normal

  # ── Job 2: Build image and deploy (only if tests passed) ─────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write       # Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build + push with a GitHub Actions layer cache so unchanged layers
      # (base image, restore, publish of unchanged code) are reused across runs
      # instead of rebuilt from scratch every deploy.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: BlueberryMart.Api/
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --update-env-vars "ASPNETCORE_ENVIRONMENT=Production,Gcs__BucketName=blueberrymart-review-images-278293545480,ESEWA__APIBASEURL=https://blueberrymart-api-278293545480.us-central1.run.app,ESEWA__SUCCESSDEEPLINK=https://blueberrymart-api-278293545480.us-central1.run.app/payment-success.html,ESEWA__FAILUREDEEPLINK=https://blueberrymart-api-278293545480.us-central1.run.app/payment-failure.html,BigQuery__ProjectId=project-76ca6efe-7878-4dc8-bff" \
            --quiet
