<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset your Blueberry Mart password</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#f3f8f3; color:#14532d;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; padding:16px; box-sizing:border-box; }
    .card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 6px 24px rgba(0,0,0,.08); max-width:420px; width:100%; }
    .icon { font-size:48px; text-align:center; margin-bottom:12px; }
    h1 { margin:0 0 8px; font-size:22px; text-align:center; }
    .sub { color:#6b7280; font-size:14px; text-align:center; margin-bottom:24px; }
    label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
    input { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid #d1fae5; border-radius:10px;
            font-size:15px; outline:none; }
    input:focus { border-color:#16a34a; }
    button { width:100%; margin-top:22px; padding:13px; background:#16a34a; color:#fff; border:none;
             border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
    button:disabled { background:#86efac; cursor:default; }
    .msg { font-size:14px; line-height:1.6; margin-top:16px; text-align:center; }
    .err { color:#dc2626; }
    .ok { color:#16a34a; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🫐</div>
    <h1>Reset your password</h1>
    <p class="sub">Choose a new password for your Blueberry Mart account.</p>

    <form id="form">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 6 characters" />
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />
      <button id="submit" type="submit">Update password</button>
    </form>

    <p id="msg" class="msg"></p>
    <p id="done" class="msg ok hidden">✅ Password updated. Open the Blueberry Mart app and log in with your new password.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var uid = params.get('uid');
      var token = params.get('t');
      var form = document.getElementById('form');
      var msg = document.getElementById('msg');
      var done = document.getElementById('done');
      var submit = document.getElementById('submit');

      if (!uid || !token) {
        form.classList.add('hidden');
        msg.className = 'msg err';
        msg.textContent = 'This reset link is invalid. Please request a new one from the app.';
        return;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'msg';
        var pw = document.getElementById('pw').value;
        var pw2 = document.getElementById('pw2').value;
        if (pw.length < 6) { msg.className = 'msg err'; msg.textContent = 'Password must be at least 6 characters.'; return; }
        if (pw !== pw2) { msg.className = 'msg err'; msg.textContent = 'Passwords do not match.'; return; }

        submit.disabled = true;
        submit.textContent = 'Updating…';
        try {
          var res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid: uid, token: token, newPassword: pw })
          });
          if (res.ok) {
            form.classList.add('hidden');
            done.classList.remove('hidden');
            return;
          }
          var body = await res.json().catch(function () { return {}; });
          msg.className = 'msg err';
          msg.textContent = body.message || 'Could not reset your password. Please try again.';
        } catch (err) {
          msg.className = 'msg err';
          msg.textContent = 'Network error. Please check your connection and try again.';
        } finally {
          submit.disabled = false;
          submit.textContent = 'Update password';
        }
      });
    })();
  </script>
</body>
</html>
