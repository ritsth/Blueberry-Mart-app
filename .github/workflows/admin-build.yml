name: Admin Portal CI

on:
  push:
    branches: [main]
    paths:
      - 'BlueberryMartAdmin/**'
      - '.github/workflows/admin-build.yml'

jobs:
  # Each check is its own job so it shows as a separate status line and runs in
  # parallel — a lint failure doesn't hide the build result and vice versa.
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BlueberryMartAdmin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: BlueberryMartAdmin

      - name: ESLint
        run: npm run lint
        working-directory: BlueberryMartAdmin

  build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BlueberryMartAdmin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: BlueberryMartAdmin

      # `npm run build` runs `tsc -b` (type check) then `vite build` (production
      # bundle) — catches both type errors and build-breaking changes.
      - name: Build
        run: npm run build
        working-directory: BlueberryMartAdmin

      # Non-blocking dependency vulnerability surface. Promote to blocking once
      # it runs clean.
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: BlueberryMartAdmin
        continue-on-error: true

      # Hand the exact bundle to the deploy job so it isn't rebuilt twice.
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: BlueberryMartAdmin/dist
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [lint, build]
    # admin-build only triggers on push to main, but guard anyway so a future
    # PR trigger wouldn't deploy.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write       # Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bring in the bundle the build job produced (lands in BlueberryMartAdmin/dist,
      # which firebase.json serves as `public`).
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: BlueberryMartAdmin/dist

      # Keyless auth, reusing the same WIF identity the backend deploy uses.
      # The service account needs roles/firebasehosting.admin on the project.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: >-
          npx --yes firebase-tools@13 deploy
          --only hosting
          --project project-76ca6efe-7878-4dc8-bff
          --non-interactive
        working-directory: BlueberryMartAdmin
