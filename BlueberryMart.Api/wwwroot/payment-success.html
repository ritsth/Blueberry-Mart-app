<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment successful</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#f3f8f3; color:#14532d;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 6px 24px rgba(0,0,0,.08); text-align:center; max-width:340px; }
    .tick { font-size:56px; }
    h1 { margin:.4em 0; font-size:22px; }
    p { color:#3f6b48; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">✅</div>
    <h1>Payment successful</h1>
    <p>Your order has been confirmed. You can close this window.</p>
  </div>
</body>
</html>
