name: Frontend Type Check

on:
  push:
    branches: [main]
    paths:
      - 'BlueberryMartApp/**'
      - '.github/workflows/frontend-typecheck.yml'

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BlueberryMartApp/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: BlueberryMartApp

      - name: TypeScript type check
        run: ./node_modules/.bin/tsc --noEmit
        working-directory: BlueberryMartApp

      # Fails on lint errors; the existing exhaustive-deps warnings don't fail
      # the build (eslint exits 0 on warnings), so this gates new errors only.
      - name: ESLint
        run: npm run lint
        working-directory: BlueberryMartApp

      # Non-blocking: surfaces known vulnerabilities without failing the build,
      # since Expo/React Native pull in transitive advisories we often can't fix
      # directly. Review the summary; promote to blocking once it runs clean.
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: BlueberryMartApp
        continue-on-error: true
